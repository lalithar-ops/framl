<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FBN FRAML Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Clari5 WhatsApp Alert Widget -->
    <!-- During live demo: loads from local proxy (port 3001) for two-way functionality -->
    <!-- When proxy is offline: loads from Vercel static (send-only, no reply polling) -->
    <script>
      (function () {
        var proxyUrl = 'http://127.0.0.1:3001/widget.js';
        var fallbackUrl = '/widget.js';
        var s = document.createElement('script');
        s.src = proxyUrl;
        s.onerror = function () {
          var fb = document.createElement('script');
          fb.src = fallbackUrl;
          fb.onerror = function () {
            console.log('[Clari5] WhatsApp widget unavailable');
          };
          document.head.appendChild(fb);
        };
        document.head.appendChild(s);
      })();
    </script>
  </body>
</html>
